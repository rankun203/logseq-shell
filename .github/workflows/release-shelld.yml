name: Build and publish release artifacts

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
      - "[0-9]*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-shelld:
    name: build logseq-shelld (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-14
            target: aarch64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release -p logseq-shelld --target ${{ matrix.target }}

      - name: Package daemon artifact
        shell: bash
        run: |
          set -euo pipefail
          BIN="target/${{ matrix.target }}/release/logseq-shelld"
          OUT="logseq-shelld-${{ matrix.target }}"
          cp "$BIN" "$OUT"
          chmod +x "$OUT"
          tar -czf "$OUT.tar.gz" "$OUT"
          shasum -a 256 "$OUT.tar.gz" > "$OUT.tar.gz.sha256"

      - name: Upload daemon artifacts (workflow)
        uses: actions/upload-artifact@v4
        with:
          name: logseq-shelld-${{ matrix.target }}
          path: |
            logseq-shelld-${{ matrix.target }}.tar.gz
            logseq-shelld-${{ matrix.target }}.tar.gz.sha256

  build-plugin:
    name: build logseq-shell plugin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack (pnpm)
        run: |
          corepack enable
          corepack prepare pnpm@10.29.3 --activate

      - name: Verify pnpm
        run: corepack pnpm --version

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Build plugin
        run: corepack pnpm --filter logseq-shell build

      - name: Package plugin artifact
        shell: bash
        run: |
          set -euo pipefail
          STAGING="logseq-shell-plugin"
          mkdir -p "$STAGING"

          cp -R apps/logseq-shell/dist "$STAGING/dist"
          cp apps/logseq-shell/package.json "$STAGING/package.json"
          cp apps/logseq-shell/logseq-plugin.edn "$STAGING/logseq-plugin.edn"
          cp apps/logseq-shell/icon.svg "$STAGING/icon.svg"
          cp apps/logseq-shell/README.md "$STAGING/README.md"
          cp LICENSE "$STAGING/LICENSE"

          zip -r logseq-shell-plugin.zip "$STAGING"
          shasum -a 256 logseq-shell-plugin.zip > logseq-shell-plugin.zip.sha256

      - name: Upload plugin artifacts (workflow)
        uses: actions/upload-artifact@v4
        with:
          name: logseq-shell-plugin
          path: |
            logseq-shell-plugin.zip
            logseq-shell-plugin.zip.sha256

  release:
    name: publish GitHub release assets
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs:
      - build-shelld
      - build-plugin

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Show release assets
        run: find release-assets -type f | sort

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/**/*.tar.gz
            release-assets/**/*.zip
            release-assets/**/*.sha256
