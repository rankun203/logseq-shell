name: Build and publish logseq-shelld

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release -p logseq-shelld --target ${{ matrix.target }}

      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail
          BIN="target/${{ matrix.target }}/release/logseq-shelld"
          OUT="logseq-shelld-${{ matrix.target }}"
          cp "$BIN" "$OUT"
          chmod +x "$OUT"
          tar -czf "$OUT.tar.gz" "$OUT"
          shasum -a 256 "$OUT.tar.gz" > "$OUT.tar.gz.sha256"

      - name: Upload build artifacts (workflow)
        uses: actions/upload-artifact@v4
        with:
          name: logseq-shelld-${{ matrix.target }}
          path: |
            logseq-shelld-${{ matrix.target }}.tar.gz
            logseq-shelld-${{ matrix.target }}.tar.gz.sha256

      - name: Upload release assets (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            logseq-shelld-${{ matrix.target }}.tar.gz
            logseq-shelld-${{ matrix.target }}.tar.gz.sha256
