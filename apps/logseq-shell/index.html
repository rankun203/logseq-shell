<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>logseq-shell</title>
    <style>
      html, body, #app { margin: 0; width: 100%; height: 100%; }
      body {
        background: var(--ls-secondary-background-color, var(--ls-primary-background-color, #111));
        color: var(--ls-primary-text-color, #ddd);
        font-family: var(--ls-font-family, Inter, sans-serif);
      }
      .shell-root { display: flex; flex-direction: column; height: 100%; }
      .shell-toolbar {
        height: 36px; display: flex; align-items: center; gap: 8px;
        padding: 0 8px;
        border-bottom: 1px solid var(--ls-border-color, #333);
        background: var(--ls-secondary-background-color, #1a1a1a);
      }
      .shell-toolbar button {
        border: 1px solid var(--ls-border-color, #444);
        background: var(--ls-tertiary-background-color, #222);
        color: var(--ls-primary-text-color, #ddd);
        border-radius: 6px;
        padding: 4px 8px;
        cursor: pointer;
      }
      .terminal-wrap { flex: 1; min-height: 0; }
      .status {
        font-size: 12px;
        color: var(--ls-secondary-text-color, #aaa);
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
