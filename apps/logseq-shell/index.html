<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>logseq-shell</title>
    <style>
      html, body, #app {
        margin: 0;
        width: 100%;
        height: 100%;
      }

      body {
        background: var(--ls-secondary-background-color, var(--ls-primary-background-color, #111));
        color: var(--ls-primary-text-color, #ddd);
        font-family: var(--ls-font-family, Inter, sans-serif);
      }

      .shell-root {
        position: relative;
        display: flex;
        flex-direction: column;
        height: 100%;
      }

      .terminal-wrap {
        flex: 1;
        min-height: 0;
      }

      .resize-handle {
        position: absolute;
        z-index: 30;
        user-select: none;
        touch-action: none;
      }

      .shell-root[data-dock-side="right"] .resize-handle {
        top: 0;
        left: 0;
        bottom: 0;
        width: 8px;
        cursor: ew-resize;
      }

      .shell-root[data-dock-side="bottom"] .resize-handle {
        left: 0;
        top: 0;
        right: 0;
        height: 8px;
        cursor: ns-resize;
      }

      .shell-root .resize-handle::after {
        content: '';
        position: absolute;
        background: var(--ls-border-color, #666);
        opacity: 0;
        transition: opacity 120ms ease;
      }

      .shell-root[data-dock-side="right"] .resize-handle::after {
        top: 0;
        right: 0;
        width: 1px;
        height: 100%;
      }

      .shell-root[data-dock-side="bottom"] .resize-handle::after {
        left: 0;
        bottom: 0;
        width: 100%;
        height: 1px;
      }

      .shell-root .resize-handle:hover::after,
      .shell-root.is-resizing .resize-handle::after {
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
