<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>logseq-shell</title>
    <style>
      html, body, #app {
        margin: 0;
        width: 100%;
        height: 100%;
      }

      body {
        background: var(--ls-secondary-background-color, var(--ls-primary-background-color, #111));
        color: var(--ls-primary-text-color, #ddd);
        font-family: var(--ls-font-family, Inter, sans-serif);
      }

      .shell-root {
        position: relative;
        display: flex;
        flex-direction: column;
        height: 100%;
      }

      .shell-session-controls {
        position: absolute;
        top: 10px;
        right: 10px;
        z-index: 40;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        opacity: 0.3;
        transition: opacity 120ms ease;
      }

      .shell-session-controls:hover,
      .shell-session-controls:focus-within {
        opacity: 1;
      }

      .session-action-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 26px;
        height: 26px;
        border-radius: 4px;
        border: 1px solid transparent;
        background: transparent;
        color: var(--ls-secondary-text-color, var(--ls-primary-text-color, #ddd));
        cursor: pointer;
        transition: background-color 120ms ease, border-color 120ms ease, color 120ms ease;
      }

      .session-action-btn--light {
        background: color-mix(in srgb, white 92%, var(--ls-primary-background-color, #fff) 8%);
        border-color: color-mix(in srgb, black 18%, transparent);
        color: #20242b;
      }

      .session-action-btn:not(.session-action-btn--light):hover,
      .session-action-btn:not(.session-action-btn--light):focus-visible {
        color: var(--ls-primary-text-color, #fff);
        border-color: var(--ls-border-color, #666);
        background: color-mix(in srgb, var(--ls-secondary-background-color, #222) 88%, black 12%);
      }

      .session-action-btn--light:hover,
      .session-action-btn--light:focus-visible {
        opacity: 1;
        color: #111;
        border-color: color-mix(in srgb, black 28%, transparent);
        background: white;
      }

      .session-action-btn svg {
        width: 14px;
        height: 14px;
        stroke-width: 2.1;
      }

      .terminal-wrap {
        flex: 1;
        min-height: 0;
      }

      .resize-handle {
        position: absolute;
        z-index: 30;
        user-select: none;
        touch-action: none;
      }

      .shell-root[data-dock-side="right"] .resize-handle {
        top: 0;
        left: 0;
        bottom: 0;
        width: 8px;
        cursor: ew-resize;
      }

      .shell-root[data-dock-side="bottom"] .resize-handle {
        left: 0;
        top: 0;
        right: 0;
        height: 8px;
        cursor: ns-resize;
      }

      .shell-root .resize-handle::after {
        content: '';
        position: absolute;
        background: var(--ls-border-color, #666);
        opacity: 0;
        transition: opacity 120ms ease;
      }

      .shell-root[data-dock-side="right"] .resize-handle::after {
        top: 0;
        right: 0;
        width: 1px;
        height: 100%;
      }

      .shell-root[data-dock-side="bottom"] .resize-handle::after {
        left: 0;
        bottom: 0;
        width: 100%;
        height: 1px;
      }

      .shell-root .resize-handle:hover::after,
      .shell-root.is-resizing .resize-handle::after {
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
